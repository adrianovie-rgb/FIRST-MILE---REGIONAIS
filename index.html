
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FM METRICS Multi-Regional</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.hd{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);color:#fff;padding:20px 30px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.hd h1{font-size:1.5rem;font-weight:700;letter-spacing:-0.5px}
.hd .sub{font-size:.85rem;opacity:.8}
.tabs{display:flex;background:#16213e;padding:0 20px;gap:4px;flex-wrap:wrap}
.tab{padding:12px 20px;color:rgba(255,255,255,.7);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;font-size:.85rem;font-weight:500}
.tab:hover{color:#fff;background:rgba(255,255,255,.05)}
.tab.active{color:#4fc3f7;border-bottom-color:#4fc3f7}
.container{max-width:1400px;margin:0 auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:25px}
.card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card-title{font-size:.75rem;text-transform:uppercase;color:#666;margin-bottom:8px;font-weight:600}
.card-value{font-size:1.4rem;font-weight:700}
.card-sub{font-size:.7rem;color:#888;margin-top:4px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:25px}
th{background:#f8f9fa;padding:12px 15px;text-align:left;font-size:.75rem;text-transform:uppercase;color:#555;font-weight:600;position:sticky;top:0}
td{padding:10px 15px;border-top:1px solid #eee;font-size:.82rem}
tr:hover td{background:#f8f9fa}
.good{color:#2e7d32}.bad{color:#c62828}.warn{color:#f57f17}.neutral{color:#555}
.trend{display:inline-block;font-size:.7rem;padding:2px 6px;border-radius:4px;margin-left:5px}
.trend-up{background:#e8f5e9;color:#2e7d32}.trend-down{background:#ffebee;color:#c62828}
.chart-container{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:25px}
.chart-title{font-size:.9rem;font-weight:600;margin-bottom:15px;color:#1a1a2e}
.bar-row{display:flex;align-items:center;margin-bottom:8px;gap:10px}
.bar-label{min-width:80px;font-size:.75rem;color:#555;text-align:right}
.bar-track{flex:1;height:22px;background:#f0f0f0;border-radius:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:6px;transition:width .5s ease;display:flex;align-items:center;padding:0 8px}
.bar-text{font-size:.7rem;color:#fff;font-weight:600;white-space:nowrap}
.section-title{font-size:1rem;font-weight:700;margin:25px 0 15px;padding-left:10px;border-left:4px solid #4fc3f7;color:#1a1a2e}
.ft{text-align:center;padding:20px;color:#999;font-size:.75rem}
.panel{display:none}.panel.active{display:block}
.toast{position:fixed;top:20px;right:20px;background:#1a1a2e;color:#fff;padding:12px 24px;border-radius:8px;font-size:.85rem;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
@media(max-width:768px){.hd h1{font-size:1.2rem}.grid{grid-template-columns:1fr 1fr}.container{padding:15px}}
</style>
</head>
<body>
<div class="hd">
<div>
<h1>FM METRICS Multi-Regional Dashboard</h1>
<div class="sub" id="lastUp"></div>
</div>
<div style="text-align:right">
<div class="sub">Semana: <strong id="wkLabel"></strong></div>
<div class="sub" id="metaInfo"></div>
</div>
</div>
<div class="tabs" id="tabBar"></div>
<div class="container" id="mainContent"></div>
<div class="ft">FM METRICS Multi-Regional Dashboard | Amazon Logistics Brasil</div>
<script src="data.js"></script>
<script>
var WK = D.semanas;
var NW = WK.length;
var R = Object.keys(D.regionais);
var C = ["#1a73e8","#555555","#e65100","#0097a7","#2e7d32"];
var M = {recv: 98.5, stow: 99.5, dep: 99.5};

function getVal(regional, semana, metric) {
  var reg = D.regionais[regional];
  if (!reg) return null;
  var wk = reg[semana];
  if (!wk) return null;
  var v = wk[metric];
  if (v === "" || v === null || v === undefined) return null;
  return v;
}

function showToast(m){var t=document.createElement('div');t.className='toast show';t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.classList.remove('show');setTimeout(function(){t.remove();},300);},3000);}
function fmt(v,d,s){if(v==null)return'—';if(s)return(v*100).toFixed(d!==undefined?d:2)+'%';return typeof v==='number'?v.toLocaleString('pt-BR'):v;}
function cls(v,g,b){if(v==null)return'neutral';if(typeof g==='number'){return v>=g?'good':v>=b?'warn':'bad';}return'neutral';}
function showTab(idx){var panels=document.querySelectorAll('.panel');var tabs=document.querySelectorAll('.tab');for(var i=0;i<panels.length;i++){panels[i].classList.remove('active');tabs[i].classList.remove('active');}panels[idx].classList.add('active');tabs[idx].classList.add('active');}

function resolveLabels(){
  document.getElementById('lastUp').textContent='Atualizado: '+D.lastUpdate;
  document.getElementById('wkLabel').textContent=WK[NW-1];
  document.getElementById('metaInfo').textContent='Receive: '+M.recv+'% | Stow: '+M.stow+'% | Depart: '+M.dep+'%';
}

function drawChart(container,label,values,regNames,meta,isPercent,maxVal){
  var c=document.createElement('div');c.className='chart-container';
  var t='<div class="chart-title">'+label+'</div>';
  for(var i=0;i<values.length;i++){
    var val=values[i];
    var pct=0;
    if(val!=null){pct=isPercent?(val*100):(maxVal>0?(val/maxVal*100):0);}
    var color=C[i%C.length];
    var display=val!=null?(isPercent?(val*100).toFixed(2)+'%':Math.round(val).toLocaleString('pt-BR')):'—';
    t+='<div class="bar-row"><div class="bar-label">'+regNames[i]+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.min(pct,100)+'%;background:'+color+'"><span class="bar-text">'+display+'</span></div></div></div>';
  }
  if(meta!=null){t+='<div style="text-align:right;font-size:.7rem;color:#888;margin-top:5px">Meta: '+meta+'%</div>';}
  c.innerHTML=t;container.appendChild(c);
}

document.addEventListener('DOMContentLoaded',function(){
  resolveLabels();
  var tabBar=document.getElementById('tabBar');
  var main=document.getElementById('mainContent');

  for(var w=0;w<NW;w++){
    var tb=document.createElement('div');
    tb.className='tab'+(w===NW-1?' active':'');
    tb.textContent=WK[w];
    tb.setAttribute('data-idx',String(w));
    tb.onclick=function(){showTab(parseInt(this.getAttribute('data-idx')));};
    tabBar.appendChild(tb);
  }

  for(var w=0;w<NW;w++){
    var semana=WK[w];
    var p=document.createElement('div');
    p.className='panel'+(w===NW-1?' active':'');

    var totalVol=0;
    for(var r=0;r<R.length;r++){var v=getVal(R[r],semana,'volume');if(v)totalVol+=v;}

    var grid='<div class="grid">';
    grid+='<div class="card"><div class="card-title">Volume Total</div><div class="card-value">'+totalVol.toLocaleString('pt-BR')+'</div><div class="card-sub">Pacotes processados</div></div>';
    for(var r=0;r<R.length;r++){
      var vol=getVal(R[r],semana,'volume')||0;
      var share=totalVol>0?(vol/totalVol):0;
      grid+='<div class="card"><div class="card-title">'+R[r]+'</div><div class="card-value">'+vol.toLocaleString('pt-BR')+'</div><div class="card-sub">'+fmt(share,1,true)+' do total</div></div>';
    }
    grid+='</div>';
    p.innerHTML=grid;

    var recvVals=[];var stowVals=[];var depVals=[];var bklVals=[];
    for(var r=0;r<R.length;r++){
      recvVals.push(getVal(R[r],semana,'receive'));
      stowVals.push(getVal(R[r],semana,'stow'));
      depVals.push(getVal(R[r],semana,'depart'));
      bklVals.push(getVal(R[r],semana,'backlog'));
    }

    var secRecv=document.createElement('div');secRecv.innerHTML='<div class="section-title">Receive Success %</div>';p.appendChild(secRecv);
    drawChart(p,'Receive Success % — '+semana,recvVals,R,M.recv,true,1);

    var secStow=document.createElement('div');secStow.innerHTML='<div class="section-title">Stow Success %</div>';p.appendChild(secStow);
    drawChart(p,'Stow Success % — '+semana,stowVals,R,M.stow,true,1);

    var secDep=document.createElement('div');secDep.innerHTML='<div class="section-title">Depart Success %</div>';p.appendChild(secDep);
    drawChart(p,'Depart Success % — '+semana,depVals,R,M.dep,true,1);

    var secBkl=document.createElement('div');secBkl.innerHTML='<div class="section-title">Backlog & Missort</div>';p.appendChild(secBkl);
    var maxBkl=0;for(var r=0;r<R.length;r++){var bv=bklVals[r];if(bv&&bv>maxBkl)maxBkl=bv;}
    drawChart(p,'FM Backlog Delay — '+semana,bklVals,R,null,false,maxBkl);

    var tbl='<table><tr><th>Regional</th><th>Volume</th><th>Share</th><th>Receive%</th><th>Stow%</th><th>Depart%</th><th>Backlog</th><th>PPP</th><th>Missort</th></tr>';
    for(var r=0;r<R.length;r++){
      var vol=getVal(R[r],semana,'volume')||0;
      var share=totalVol>0?(vol/totalVol):0;
      var recv=getVal(R[r],semana,'receive');
      var stow=getVal(R[r],semana,'stow');
      var dep=getVal(R[r],semana,'depart');
      var bkl=getVal(R[r],semana,'backlog');
      var ppp=getVal(R[r],semana,'ppp');
      var miss=getVal(R[r],semana,'missort');
      tbl+='<tr><td style="font-weight:600">'+R[r]+'</td><td>'+fmt(vol)+'</td><td>'+fmt(share,1,true)+'</td><td class="'+cls(recv,.985,.97)+'">'+fmt(recv,2,true)+'</td><td class="'+cls(stow,.995,.98)+'">'+fmt(stow,2,true)+'</td><td class="'+cls(dep,.995,.98)+'">'+fmt(dep,2,true)+'</td><td>'+fmt(bkl)+'</td><td>'+fmt(ppp,1)+'</td><td>'+fmt(miss)+'</td></tr>';
    }
    tbl+='</table>';
    var tblDiv=document.createElement('div');tblDiv.innerHTML=tbl;p.appendChild(tblDiv);
    main.appendChild(p);
  }

  var trendPanel=document.createElement('div');trendPanel.className='panel';
  var trendHtml='<div class="section-title">Tendência ('+NW+' Semanas)</div>';
  trendHtml+='<table><tr><th>Regional</th>';for(var w=0;w<NW;w++)trendHtml+='<th>'+WK[w]+'</th>';trendHtml+='</tr>';
  for(var r=0;r<R.length;r++){trendHtml+='<tr><td style="font-weight:600">'+R[r]+'</td>';for(var w=0;w<NW;w++){trendHtml+='<td>'+fmt(getVal(R[r],WK[w],'volume'))+'</td>';}trendHtml+='</tr>';}
  trendHtml+='</table>';

  trendHtml+='<div class="section-title" style="margin-top:30px">Receive % — Tendência</div><table><tr><th>Regional</th>';for(var w=0;w<NW;w++)trendHtml+='<th>'+WK[w]+'</th>';trendHtml+='</tr>';
  for(var r=0;r<R.length;r++){trendHtml+='<tr><td style="font-weight:600">'+R[r]+'</td>';for(var w=0;w<NW;w++){var v=getVal(R[r],WK[w],'receive');trendHtml+='<td class="'+cls(v,.985,.97)+'">'+fmt(v,2,true)+'</td>';}trendHtml+='</tr>';}
  trendHtml+='</table>';

  trendHtml+='<div class="section-title" style="margin-top:30px">Stow % — Tendência</div><table><tr><th>Regional</th>';for(var w=0;w<NW;w++)trendHtml+='<th>'+WK[w]+'</th>';trendHtml+='</tr>';
  for(var r=0;r<R.length;r++){trendHtml+='<tr><td style="font-weight:600">'+R[r]+'</td>';for(var w=0;w<NW;w++){var v=getVal(R[r],WK[w],'stow');trendHtml+='<td class="'+cls(v,.995,.98)+'">'+fmt(v,2,true)+'</td>';}trendHtml+='</tr>';}
  trendHtml+='</table>';

  trendHtml+='<div class="section-title" style="margin-top:30px">Depart % — Tendência</div><table><tr><th>Regional</th>';for(var w=0;w<NW;w++)trendHtml+='<th>'+WK[w]+'</th>';trendHtml+='</tr>';
  for(var r=0;r<R.length;r++){trendHtml+='<tr><td style="font-weight:600">'+R[r]+'</td>';for(var w=0;w<NW;w++){var v=getVal(R[r],WK[w],'depart');trendHtml+='<td class="'+cls(v,.995,.98)+'">'+fmt(v,2,true)+'</td>';}trendHtml+='</tr>';}
  trendHtml+='</table>';

  trendPanel.innerHTML=trendHtml;main.appendChild(trendPanel);
  var trendTab=document.createElement('div');trendTab.className='tab';trendTab.textContent='Tendência';trendTab.setAttribute('data-idx',String(NW));trendTab.onclick=function(){showTab(parseInt(this.getAttribute('data-idx')));};tabBar.appendChild(trendTab);

  var resumo=document.createElement('div');resumo.className='panel';
  var lastWk=WK[NW-1];
  var rHtml='<div class="section-title">Resumo Executivo — '+lastWk+'</div><div class="grid">';
  var tV=0;for(var r=0;r<R.length;r++){var v=getVal(R[r],lastWk,'volume');if(v)tV+=v;}
  rHtml+='<div class="card"><div class="card-title">Volume Total</div><div class="card-value">'+tV.toLocaleString('pt-BR')+'</div></div>';
  var avgR=0,avgS=0,avgD=0,cnt=0;
  for(var r=0;r<R.length;r++){var rv=getVal(R[r],lastWk,'receive');var sv=getVal(R[r],lastWk,'stow');var dv=getVal(R[r],lastWk,'depart');if(rv!=null){avgR+=rv;avgS+=sv;avgD+=dv;cnt++;}}
  if(cnt>0){avgR/=cnt;avgS/=cnt;avgD/=cnt;}
  rHtml+='<div class="card"><div class="card-title">Receive Médio</div><div class="card-value '+cls(avgR,.985,.97)+'">'+fmt(avgR,2,true)+'</div></div>';
  rHtml+='<div class="card"><div class="card-title">Stow Médio</div><div class="card-value '+cls(avgS,.995,.98)+'">'+fmt(avgS,2,true)+'</div></div>';
  rHtml+='<div class="card"><div class="card-title">Depart Médio</div><div class="card-value '+cls(avgD,.995,.98)+'">'+fmt(avgD,2,true)+'</div></div>';
  rHtml+='</div>';
  resumo.innerHTML=rHtml;

  var rVolVals=[];var rRecvVals=[];var rStowVals=[];var rDepVals=[];
  for(var r=0;r<R.length;r++){rVolVals.push(getVal(R[r],lastWk,'volume')||0);rRecvVals.push(getVal(R[r],lastWk,'receive'));rStowVals.push(getVal(R[r],lastWk,'stow'));rDepVals.push(getVal(R[r],lastWk,'depart'));}
  drawChart(resumo,'Volume por Regional — '+lastWk,rVolVals,R,null,false,Math.max.apply(null,rVolVals));
  drawChart(resumo,'Receive % por Regional',rRecvVals,R,M.recv,true,1);
  drawChart(resumo,'Stow % por Regional',rStowVals,R,M.stow,true,1);
  drawChart(resumo,'Depart % por Regional',rDepVals,R,M.dep,true,1);

  main.appendChild(resumo);
  var resTab=document.createElement('div');resTab.className='tab';resTab.textContent='Resumo';resTab.setAttribute('data-idx',String(NW+1));resTab.onclick=function(){showTab(parseInt(this.getAttribute('data-idx')));};tabBar.appendChild(resTab);
});
</script>
</body>
</html>
