
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FM METRICS Multi-Regional</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.hd{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);color:#fff;padding:20px 30px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.hd h1{font-size:1.5rem;font-weight:700;letter-spacing:-0.5px}
.hd .sub{font-size:.85rem;opacity:.8}
.tabs{display:flex;background:#16213e;padding:0 20px;gap:4px;flex-wrap:wrap}
.tab{padding:12px 20px;color:rgba(255,255,255,.7);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;font-size:.85rem;font-weight:500}
.tab:hover{color:#fff;background:rgba(255,255,255,.05)}
.tab.active{color:#4fc3f7;border-bottom-color:#4fc3f7}
.container{max-width:1400px;margin:0 auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:25px}
.card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card-title{font-size:.75rem;text-transform:uppercase;color:#666;margin-bottom:8px;font-weight:600}
.card-value{font-size:1.4rem;font-weight:700}
.card-sub{font-size:.7rem;color:#888;margin-top:4px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:25px}
th{background:#f8f9fa;padding:12px 15px;text-align:left;font-size:.75rem;text-transform:uppercase;color:#555;font-weight:600;position:sticky;top:0}
td{padding:10px 15px;border-top:1px solid #eee;font-size:.82rem}
tr:hover td{background:#f8f9fa}
.good{color:#2e7d32}.bad{color:#c62828}.warn{color:#f57f17}.neutral{color:#555}
.trend{display:inline-block;font-size:.7rem;padding:2px 6px;border-radius:4px;margin-left:5px}
.trend-up{background:#e8f5e9;color:#2e7d32}.trend-down{background:#ffebee;color:#c62828}
.chart-container{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:25px}
.chart-title{font-size:.9rem;font-weight:600;margin-bottom:15px;color:#1a1a2e}
.bar-row{display:flex;align-items:center;margin-bottom:8px;gap:10px}
.bar-label{min-width:80px;font-size:.75rem;color:#555;text-align:right}
.bar-track{flex:1;height:22px;background:#f0f0f0;border-radius:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:6px;transition:width .5s ease;display:flex;align-items:center;padding:0 8px}
.bar-text{font-size:.7rem;color:#fff;font-weight:600;white-space:nowrap}
.section-title{font-size:1rem;font-weight:700;margin:25px 0 15px;padding-left:10px;border-left:4px solid #4fc3f7;color:#1a1a2e}
.ft{text-align:center;padding:20px;color:#999;font-size:.75rem}
.panel{display:none}.panel.active{display:block}
.toast{position:fixed;top:20px;right:20px;background:#1a1a2e;color:#fff;padding:12px 24px;border-radius:8px;font-size:.85rem;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
@media(max-width:768px){.hd h1{font-size:1.2rem}.grid{grid-template-columns:1fr 1fr}.container{padding:15px}}
</style>
</head>
<body>
<div class="hd">
<div>
<h1>FM METRICS Multi-Regional Dashboard</h1>
<div class="sub" id="lastUp"></div>
</div>
<div style="text-align:right">
<div class="sub">Semana: <strong id="wkLabel"></strong></div>
<div class="sub" id="metaInfo"></div>
</div>
</div>
<div class="tabs" id="tabBar"></div>
<div class="container" id="mainContent"></div>
<div class="ft">FM METRICS Multi-Regional Dashboard | Amazon Logistics Brasil</div>
<script src="data.js"></script>
<script>
(function(){
  if(!D || !D.regionais) return;
  var regs = Object.keys(D.regionais);
  var sems = D.semanas;
  D.volume=[];D.receive=[];D.stow=[];D.depart=[];
  D.backlog=[];D.backlog_acc=[];D.ppp=[];D.missort=[];
  for(var i=0;i<regs.length;i++){
    var rName=regs[i];
    var vR=[rName],rcR=[rName],stR=[rName],dpR=[rName];
    var bkR=[rName],baR=[rName],ppR=[rName],msR=[rName];
    for(var j=0;j<sems.length;j++){
      var wk=sems[j];
      var obj=(D.regionais[rName]&&D.regionais[rName][wk])||{};
      vR.push(obj.volume||0);
      rcR.push(obj.receive||0);
      stR.push(obj.stow||0);
      dpR.push(obj.depart||0);
      bkR.push(obj.backlog||0);
      baR.push(obj.backlog_acc||0);
      ppR.push(obj.ppp||0);
      msR.push(obj.missort||0);
    }
    D.volume.push(vR);D.receive.push(rcR);D.stow.push(stR);D.depart.push(dpR);
    D.backlog.push(bkR);D.backlog_acc.push(baR);D.ppp.push(ppR);D.missort.push(msR);
  }
})();
</script>
<script>
(function(){
  if(!D||!D.semanas||!D.volume) return;
  var semanas=D.semanas;
  var META_RECV=D.meta&&D.meta.receive?D.meta.receive:98.5;
  var META_STOW=D.meta&&D.meta.stow?D.meta.stow:99.5;
  var META_DEP=D.meta&&D.meta.depart?D.meta.depart:99.5;
  var META_PPP=D.meta&&D.meta.ppp?D.meta.ppp:175;
  var R_THP=D.meta&&D.meta.tph?D.meta.tph:58.96;

  document.getElementById('lastUp').textContent='Atualizado: '+D.lastUpdate;

  var tabBar=document.getElementById('tabBar');
  var mainContent=document.getElementById('mainContent');

  // Aba "Tendencia" + abas por semana
  var allTabs=['Tendência'];
  for(var s=0;s<semanas.length;s++) allTabs.push(semanas[s]);

  for(var t=0;t<allTabs.length;t++){
    var tab=document.createElement('div');
    tab.className='tab'+(t===allTabs.length-1?' active':'');
    tab.textContent=allTabs[t];
    tab.setAttribute('data-idx',t);
    tab.onclick=function(){
      var tabs=tabBar.querySelectorAll('.tab');
      for(var x=0;x<tabs.length;x++) tabs[x].className='tab';
      this.className='tab active';
      renderPanel(parseInt(this.getAttribute('data-idx')));
    };
    tabBar.appendChild(tab);
  }

  function fmt(v){if(v===null||v===undefined)return'-';if(v>=1000)return v.toLocaleString('pt-BR');return v;}
  function fmtPct(v){if(v===null||v===undefined)return'-';return(v*100).toFixed(2)+'%';}
  function fmtPctRaw(v){if(v===null||v===undefined)return'-';return v.toFixed(2)+'%';}
  function colorPct(v,meta){if(v===null||v===undefined)return'neutral';return(v*100>=meta)?'good':'bad';}
  function colorPctRaw(v,meta){if(v===null||v===undefined)return'neutral';return(v>=meta)?'good':'bad';}

  function renderPanel(idx){
    mainContent.innerHTML='';
    if(idx===0){renderTrend();return;}
    var wkIdx=idx; // index in semanas (1-based from allTabs, so subtract 1 for array)
    var sIdx=wkIdx-1;
    var wkName=semanas[sIdx];
    document.getElementById('wkLabel').textContent=wkName;

    // Cards totais
    var totVol=0,totRecv=0,totStow=0,totDep=0,totBkl=0,totBklAcc=0,totPpp=0,totMiss=0,cnt=0;
    for(var r=0;r<D.volume.length;r++){
      var vol=D.volume[r][sIdx+1];
      if(vol>0){
        totVol+=vol;
        totRecv+=D.receive[r][sIdx+1]||0;
        totStow+=D.stow[r][sIdx+1]||0;
        totDep+=D.depart[r][sIdx+1]||0;
        totBkl+=D.backlog[r][sIdx+1]||0;
        totBklAcc+=D.backlog_acc[r][sIdx+1]||0;
        totPpp+=D.ppp[r][sIdx+1]||0;
        totMiss+=D.missort[r][sIdx+1]||0;
        cnt++;
      }
    }
    var avgRecv=cnt>0?totRecv/cnt:0;
    var avgStow=cnt>0?totStow/cnt:0;
    var avgDep=cnt>0?totDep/cnt:0;
    var avgPpp=cnt>0?totPpp/cnt:0;

    var grid=document.createElement('div');grid.className='grid';
    grid.innerHTML='<div class="card"><div class="card-title">Volume Total</div><div class="card-value">'+fmt(totVol)+'</div><div class="card-sub">Pacotes processados</div></div>'
      +'<div class="card"><div class="card-title">Receive Success</div><div class="card-value '+colorPct(avgRecv,META_RECV)+'">'+fmtPct(avgRecv)+'</div><div class="card-sub">Meta: '+META_RECV+'%</div></div>'
      +'<div class="card"><div class="card-title">Stow Success</div><div class="card-value '+colorPct(avgStow,META_STOW)+'">'+fmtPct(avgStow)+'</div><div class="card-sub">Meta: '+META_STOW+'%</div></div>'
      +'<div class="card"><div class="card-title">Depart Success</div><div class="card-value '+colorPct(avgDep,META_DEP)+'">'+fmtPct(avgDep)+'</div><div class="card-sub">Meta: '+META_DEP+'%</div></div>'
      +'<div class="card"><div class="card-title">Backlog</div><div class="card-value">'+fmt(totBkl)+'</div><div class="card-sub">Acumulado: '+fmt(totBklAcc)+'</div></div>'
      +'<div class="card"><div class="card-title">PPP</div><div class="card-value '+colorPctRaw(avgPpp,META_PPP)+'">'+avgPpp.toFixed(1)+'</div><div class="card-sub">Meta: '+META_PPP+'</div></div>'
      +'<div class="card"><div class="card-title">Missort</div><div class="card-value">'+fmt(totMiss)+'</div><div class="card-sub">Total de missorts</div></div>';
    mainContent.appendChild(grid);

    // Tabela por regional
    var secTitle=document.createElement('div');secTitle.className='section-title';secTitle.textContent='Detalhamento por Regional';
    mainContent.appendChild(secTitle);

    var tbl=document.createElement('table');
    tbl.innerHTML='<thead><tr><th>Regional</th><th>Volume</th><th>Receive %</th><th>Stow %</th><th>Depart %</th><th>Backlog</th><th>Bkl Acc</th><th>PPP</th><th>Missort</th></tr></thead>';
    var tbody=document.createElement('tbody');
    for(var r=0;r<D.volume.length;r++){
      var nome=D.volume[r][0];
      var vol=D.volume[r][sIdx+1]||0;
      var recv=D.receive[r][sIdx+1]||0;
      var stow=D.stow[r][sIdx+1]||0;
      var dep=D.depart[r][sIdx+1]||0;
      var bkl=D.backlog[r][sIdx+1]||0;
      var bklAcc=D.backlog_acc[r][sIdx+1]||0;
      var ppp=D.ppp[r][sIdx+1]||0;
      var miss=D.missort[r][sIdx+1]||0;
      var tr=document.createElement('tr');
      tr.innerHTML='<td><strong>'+nome+'</strong></td><td>'+fmt(vol)+'</td><td class="'+colorPct(recv,META_RECV)+'">'+fmtPct(recv)+'</td><td class="'+colorPct(stow,META_STOW)+'">'+fmtPct(stow)+'</td><td class="'+colorPct(dep,META_DEP)+'">'+fmtPct(dep)+'</td><td>'+fmt(bkl)+'</td><td>'+fmt(bklAcc)+'</td><td class="'+colorPctRaw(ppp,META_PPP)+'">'+ppp.toFixed(1)+'</td><td>'+fmt(miss)+'</td>';
      tbody.appendChild(tr);
    }
    tbl.appendChild(tbody);
    mainContent.appendChild(tbl);

    // Bar charts - Volume
    renderBarChart('Volume por Regional',D.volume,sIdx+1,'#4fc3f7',false);
    renderBarChart('Receive Success %',D.receive,sIdx+1,'#66bb6a',true);
    renderBarChart('Stow Success %',D.stow,sIdx+1,'#ab47bc',true);
    renderBarChart('Depart Success %',D.depart,sIdx+1,'#ffa726',true);
  }

  function renderBarChart(title,data,colIdx,color,isPct){
    var container=document.createElement('div');container.className='chart-container';
    var h=document.createElement('div');h.className='chart-title';h.textContent=title;
    container.appendChild(h);
    var maxVal=0;
    for(var r=0;r<data.length;r++){
      var v=data[r][colIdx]||0;
      if(isPct) v=v*100;
      if(v>maxVal) maxVal=v;
    }
    if(maxVal===0) maxVal=1;
    for(var r=0;r<data.length;r++){
      var nome=data[r][0];
      var v=data[r][colIdx]||0;
      if(isPct) v=v*100;
      var pct=(v/maxVal)*100;
      var row=document.createElement('div');row.className='bar-row';
      row.innerHTML='<div class="bar-label">'+nome+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+color+'"><span class="bar-text">'+(isPct?v.toFixed(2)+'%':fmt(Math.round(v)))+'</span></div></div>';
      container.appendChild(row);
    }
    mainContent.appendChild(container);
  }

  function renderTrend(){
    document.getElementById('wkLabel').textContent='Todas';
    var secTitle=document.createElement('div');secTitle.className='section-title';secTitle.textContent='Tendência - Todas as Semanas';
    mainContent.appendChild(secTitle);

    var metrics=[
      {name:'Volume',data:D.volume,isPct:false},
      {name:'Receive %',data:D.receive,isPct:true},
      {name:'Stow %',data:D.stow,isPct:true},
      {name:'Depart %',data:D.depart,isPct:true},
      {name:'PPP',data:D.ppp,isPct:false},
      {name:'Backlog',data:D.backlog,isPct:false}
    ];

    for(var m=0;m<metrics.length;m++){
      var metric=metrics[m];
      var container=document.createElement('div');container.className='chart-container';
      var h=document.createElement('div');h.className='chart-title';h.textContent=metric.name+' - Evolução Semanal';
      container.appendChild(h);

      var tbl=document.createElement('table');
      var thead='<thead><tr><th>Regional</th>';
      for(var s=0;s<semanas.length;s++) thead+='<th>'+semanas[s]+'</th>';
      thead+='</tr></thead>';
      tbl.innerHTML=thead;
      var tbody=document.createElement('tbody');
      for(var r=0;r<metric.data.length;r++){
        var tr=document.createElement('tr');
        var cells='<td><strong>'+metric.data[r][0]+'</strong></td>';
        for(var s=0;s<semanas.length;s++){
          var v=metric.data[r][s+1]||0;
          if(metric.isPct){
            cells+='<td>'+fmtPct(v)+'</td>';
          } else {
            cells+='<td>'+fmt(Math.round(v))+'</td>';
          }
        }
        tr.innerHTML=cells;
        tbody.appendChild(tr);
      }
      tbl.appendChild(tbody);
      container.appendChild(tbl);
      mainContent.appendChild(container);
    }
  }

  // Render ultima semana por default
  renderPanel(allTabs.length-1);
})();
</script>
</body>
</html>
